name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python tasks.py setup

      - name: Lint
        run: python tasks.py lint

      - name: Type check
        run: python tasks.py type

      - name: Test
        run: python tasks.py test

      - name: Eval
        run: python tasks.py eval
