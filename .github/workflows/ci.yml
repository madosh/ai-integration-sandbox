name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Install into the runner's Python directly so every step below shares one
      # environment. (tasks.py setup builds a local .venv, which the bare
      # `python -m pytest` step could not see — that mismatch is what failed CI.)
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          python -m ruff check src tests
          python -m black --check src tests

      - name: Type check
        run: python -m mypy

      - name: Test with coverage (gate >= 70%)
        run: >-
          python -m pytest -q
          --cov=aih --cov-report=xml --cov-report=term-missing
          --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      # Regression gate: the eval harness exits non-zero if any metric in
      # evals/datasets falls below the bar in src/aih/evals/thresholds.json
      # (recall@k, MRR, nDCG, tool-selection accuracy, red-team block rate, ...).
      # A drop in retrieval/agent quality therefore fails the build like any test.
      - name: Eval regression gate
        if: matrix.python-version == '3.12'
        run: python -m aih.evals | tee eval-output.txt

      - name: Publish eval scorecard to job summary
        if: matrix.python-version == '3.12' && always()
        run: |
          {
            echo '## Eval scorecard'
            echo '```'
            sed -n '/=== EVAL SCORECARD ===/,$p' eval-output.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # The Python job above never touches the React/TS dashboard, so a type error
  # or broken build there could merge unnoticed. This job type-checks and builds
  # it (tsc -b && vite build) on every push/PR.
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check + build
        run: npm run build
