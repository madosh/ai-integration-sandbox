services:
  service:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      AIH_ENV: local
      AIH_MOCK_API_BASE_URL: http://mock-apis:9000
      AIH_AWS_ENDPOINT_URL: http://localstack:4566
      AIH_RUN_LEDGER_PATH: /data/run_ledger.sqlite3
      # Export agent run spans to Jaeger via OTLP (see deploy/Dockerfile otel extra).
      AIH_OTEL_ENABLED: "true"
      AIH_OTEL_SERVICE_NAME: aih-service
      AIH_OTEL_ENDPOINT: http://jaeger:4317
    volumes:
      - service-data:/data
    depends_on:
      - mock-apis
      - localstack
      - jaeger

  mock-apis:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: ["uvicorn", "mock_apis.app:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"

  dashboard:
    build:
      context: .
      dockerfile: deploy/dashboard.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - service

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,dynamodb
      DEBUG: 0
    volumes:
      - localstack-data:/var/lib/localstack

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  service-data:
  localstack-data:
