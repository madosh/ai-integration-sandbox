server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the built React SPA; fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service. The trailing slash on proxy_pass
    # strips the /api prefix, mirroring the Vite dev-server rewrite.
    location /api/ {
        proxy_pass http://service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Server-Sent Events (run + search streams) need buffering disabled and
        # a long read timeout so the connection stays open.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
